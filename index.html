<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Forever Us A❤️S</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div id="loadingScreen">

        <h1>Forever Us ❤️</h1>

        <div class="loader"></div>

        <p id="loadingText">Initializing...</p>

    </div>

    <div id="loginContainer">

        <div class="card">

            <h2>Welcome My Love ❤️</h2>

            <p>Please Login</p>

            <input
                type="text"
                id="username"
                placeholder="Username">

            <input
                type="password"
                id="password"
                placeholder="Password">

            <button onclick="login()">

                Login ❤️

            </button>

        </div>

    </div>

<script src="js/login.js"></script>

</body>

</html>
